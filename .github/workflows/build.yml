name: build
on:
  workflow_call:
permissions:
  contents: read
jobs:
  compile:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: setup bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: 'latest'
      - name: install dependencies
        run: bun i
      - name: build wasm + embedded modules
        run: bun run build:asm && bun run build:embed
      - name: typecheck
        run: bun tsc --noEmit
      - name: lint
        run: bun run lint
