name: publish
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # gh release create
  id-token: write      # npm provenance + sigstore signing cert
  attestations: write  # attest-build-provenance
  packages: write      # github packages registry

jobs:
  shipit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # full history required for changelog tag range

      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 'latest'

      - name: setup node (npm registry)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: install dependencies
        run: bun i

      - name: build
        run: bun run build

      - name: pack
        run: npm pack

      - name: attest build provenance
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.3
        with:
          subject-path: 'leviathan-crypto-*.tgz'

      - name: publish to npm
        run: npm publish leviathan-crypto-*.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: setup node (github packages registry)
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://npm.pkg.github.com'

      - name: publish to github packages
        run: npm publish leviathan-crypto-*.tgz --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: generate changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"

          # run changelog script (exits 1 if breaking changes detected)
          set +e
          NOTES=$(bunx tsx scripts/gen-changelog.ts "$TAG")
          BREAKING=$?
          set -e
          echo "$NOTES" > /tmp/release-notes.md
          echo "breaking=$BREAKING" >> $GITHUB_OUTPUT

      - name: create github release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          BREAKING="${{ steps.changelog.outputs.breaking }}"

          # add warning banner if release contains breaking changes
          if [ "$BREAKING" = "1" ]; then
            TITLE="⚠ $TAG — Breaking Changes"
          else
            TITLE="$TAG"
          fi

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file /tmp/release-notes.md \
            --verify-tag \
            leviathan-crypto-*.tgz
