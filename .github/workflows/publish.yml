name: publish
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # gh release create
  id-token: write      # npm provenance + sigstore signing cert
  attestations: write  # attest-build-provenance

jobs:
  shipit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # required for changelog

      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 'latest'

      - name: setup node (npm registry)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: install dependencies
        run: bun i

      - name: build
        run: bun run build

      - name: strip devDependencies from published manifest
        run: npm pkg delete devDependencies

      - name: pack
        run: npm pack

      - name: attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'leviathan-crypto-*.tgz'

      - name: publish to npm
        run: npm publish leviathan-crypto-*.tgz --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: generate changelog
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"

          set +e
          NOTES=$(bunx tsx scripts/gen-changelog.ts "$TAG")
          BREAKING=$?
          set -e
          echo "$NOTES" > /tmp/release-notes.md
          echo "breaking=$BREAKING" >> $GITHUB_OUTPUT

      - name: create github release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          BREAKING="${{ steps.changelog.outputs.breaking }}"

          if [ "$BREAKING" = "1" ]; then
            TITLE="⚠ $TAG — Breaking Changes"
          else
            TITLE="$TAG"
          fi

          gh release create "$TAG" \
            --title "$TITLE" \
            --notes-file /tmp/release-notes.md \
            --verify-tag \
            leviathan-crypto-*.tgz
