name: unit-nessie
on:
  workflow_call:
permissions:
  contents: read
jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: setup bun
        uses: oven-sh/setup-bun@ecf28ddc73e819eb6fa29df6b34ef8921c743461 # v2
        with:
          bun-version: 'latest'
      - name: install dependencies
        run: bun i
      - name: build wasm + embedded modules
        run: bun run build:asm && bun run build:embed
      - name: run nessie unit tests
        run: >
          bun vitest run --reporter=verbose --no-coverage
          test/unit/serpent/serpent_nessie128.test.ts
          test/unit/serpent/serpent_nessie192.test.ts
          test/unit/serpent/serpent_nessie256.test.ts
