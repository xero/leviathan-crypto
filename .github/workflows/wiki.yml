name: publish wiki
on:
  # auto-runs on changes to the main branch docs folder
  push:
    branches: [ main ]
    paths:
      - 'docs/**'
  workflow_dispatch:
jobs:
  sync-docs:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          path: repo
      - name: checkout wiki
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          repository: ${{ github.repository }}.wiki
          path: wiki
          token: ${{ secrets.CICD_TOKEN }}
          persist-credentials: true
      - name: configure git
        run: |
          # get the last commit author name and email
          cd repo
          COMMIT_NAME="${{ github.event.head_commit.author.name }}"
          COMMIT_EMAIL="${{ github.event.head_commit.author.email }}"
          # default to actor name if head_commit info is not available (e.g. onDispatch)
          if [ -z "$COMMIT_NAME" ]; then
            COMMIT_NAME="${{ github.actor }}"
            COMMIT_EMAIL="${{ github.actor }}@users.noreply.github.com"
          fi
          git config --global user.name "$COMMIT_NAME"
          git config --global user.email "$COMMIT_EMAIL"
          cd ..
      - name: sync docs to wiki
        run: |
          # copy docs to wiki
          cp -r repo/docs/* wiki/
          cp repo/SECURITY.md wiki/security_policy.md
          cd wiki
          # generate roman numeral year
          y=$(date +%Y); r=""; v=(1000 900 500 400 100 90 50 40 10 9 5 4 1); s=(M CM D CD C XC L XL X IX V IV I)
          for i in "${!v[@]}"; do while (( y >= v[i] )); do r+="${s[i]}"; y=$(( y - v[i] )); done; done
          # generate _Footer.md and _Sidebar.md
          awk '/^\[footer\]/{f=1;next} /^\[sidebar\]/{f=0} f' wiki.ini \
            | sed "s/{{YEAR}}/$r/" > _Footer.md
          awk '/^\[sidebar\]/{f=1;next} f' wiki.ini > _Sidebar.md
          # remove wiki.ini from published output
          rm -f wiki.ini
          # rename README to index
          mv README.md index.md
          find . -name "*.md" -exec perl -pi -e 's/\]\((?!https?:\/\/)([^)]*?)README\.md([#][^)]+)?\)/](${1}index.md$2)/g' {} \;
          # fix internal markdown links (remove .md extension for github wiki)
          find . -name "*.md" -exec perl -pi -e 's/\]\((?!https?:\/\/)([^)]+)\.md([#][^)]+)?\)/](\1\2)/g' {} \;
          git add .
          if git diff --staged --quiet; then
            echo "nothing to commit"
            exit 0
          fi
          git commit -m "docs(wiki): sync :recycle:"
          git push
