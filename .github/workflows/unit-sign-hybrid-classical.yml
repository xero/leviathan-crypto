name: unit-sign-hybrid-classical
on:
  workflow_call:
    inputs:
      bun-version:
        description: 'Bun version to install'
        required: false
        type: string
        default: '1.3.13'
permissions:
  contents: read
jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: setup bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: ${{ inputs.bun-version }}
      - name: install dependencies
        run: bun i
      - name: run sign-hybrid-classical unit tests
        run: bun scripts/test.ts unit:group sign-hybrid-classical
