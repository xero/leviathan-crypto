<svg viewBox="80 80 640 480" xmlns="http://www.w3.org/2000/svg"><defs><filter id="shadow" x="-2%" y="-2%" width="104%" height="108%"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter><marker id="arrow" viewBox="0 0 10 10" refX="5" refY="8" markerWidth="8" markerHeight="10" orient="auto-start-auto"><path d="M 0 0 L 10 0 L 5 10 Z" fill="#667eea"/></marker><linearGradient id="grad-dev" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#e5f4df"/><stop offset="100%" stop-color="#c6dabf"/></linearGradient><linearGradient id="grad-ts" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1a936f"/><stop offset="100%" stop-color="#0d654b"/></linearGradient><linearGradient id="grad-init" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#016361"/><stop offset="100%" stop-color="#114b5f"/></linearGradient><linearGradient id="grad-wasm" x1="0" y1="0" x2="1" y2="0"><stop offset="0%" stop-color="#1c7293"/><stop offset="100%" stop-color="#114b5f"/></linearGradient><style> text { font-family: system-ui, -apple-system, sans-serif; } </style></defs><rect x="180" y="0" width="450" height="70" rx="12" fill="url(#grad-dev)" filter="url(#shadow)"/><text x="400" y="25" text-anchor="middle" font-size="18" font-weight="600" fill="#2d3748">Developer code</text><text x="400" y="50" text-anchor="middle" font-size="15" fill="#435c0b">import { init, Serpent } from 'leviathan-crypto/serpent'</text><line x1="400" y1="70" x2="400" y2="110" stroke="#667eea" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="100" y="115" width="600" height="140" rx="12" fill="url(#grad-ts)" filter="url(#shadow)"/><text x="400" y="145" text-anchor="middle" font-size="18" font-weight="700" fill="white">TypeScript API Layer</text><text x="400" y="165" text-anchor="middle" font-size="15" fill="rgba(198, 218, 191, 0.8)">src/ts/*</text><rect x="130" y="175" width="130" height="36" rx="6" fill="rgba(255,255,255,0.1)"/><text x="195" y="190" text-anchor="middle" font-size="11" fill="white">Input validation</text><text x="195" y="205" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">Type checking</text><rect x="275" y="175" width="130" height="36" rx="6" fill="rgba(255,255,255,0.1)"/><text x="340" y="190" text-anchor="middle" font-size="11" fill="white">Error messages</text><text x="340" y="205" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">Human-readable</text><rect x="420" y="175" width="130" height="36" rx="6" fill="rgba(255,255,255,0.1)"/><text x="485" y="190" text-anchor="middle" font-size="11" fill="white">Key/IV helpers</text><text x="485" y="205" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">Generation + encoding</text><rect x="565" y="175" width="105" height="36" rx="6" fill="rgba(255,255,255,0.1)"/><text x="617" y="190" text-anchor="middle" font-size="11" fill="white">Utilities</text><text x="617" y="205" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">hex, base64, wipe</text><text x="400" y="240" text-anchor="middle" font-size="14" fill="rgba(255,255,255,0.6)">Never implements cryptographic algorithms. Handles the JS/WASM boundary only</text><line x1="400" y1="255" x2="400" y2="300" stroke="#667eea" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="180" y="305" width="450" height="130" rx="12" fill="url(#grad-init)" filter="url(#shadow)"/><text x="400" y="335" text-anchor="middle" font-size="18" font-weight="700" fill="white">init() Module Cache</text><text x="400" y="358" text-anchor="middle" font-size="15" fill="rgba(198, 218, 191, 0.8)">init.ts + loader.ts</text><rect x="200" y="370" width="160" height="28" rx="5" fill="rgba(255,255,255,0.1)"/><text x="280" y="389" text-anchor="middle" font-size="10.5" fill="white">Per cipher WASM modules</text><rect x="440" y="370" width="160" height="28" rx="5" fill="rgba(255,255,255,0.1)"/><text x="520" y="389" text-anchor="middle" font-size="10.5" fill="white">Cached at module scope</text><text x="400" y="422" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.6)">All Ciphers have unique isolated modules</text><line x1="400" y1="435" x2="400" y2="475" stroke="#667eea" stroke-width="2.5" marker-end="url(#arrow)"/><rect x="100" y="480" width="600" height="150" rx="12" fill="url(#grad-wasm)" filter="url(#shadow)"/><text x="400" y="510" text-anchor="middle" font-size="18" font-weight="700" fill="white">WASM Execution Layer</text><text x="400" y="531" text-anchor="middle" font-size="15" fill="#6dc9df">src/asm/ → build/*.wasm</text><rect x="130" y="545" width="120" height="36" rx="6" fill="rgba(255,255,255,0.1)"/><text x="190" y="560" text-anchor="middle" font-size="11" fill="white">All crypto</text><text x="190" y="574" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">computation</text><rect x="265" y="545" width="120" height="36" rx="6" fill="rgba(255,255,255,0.1)"/><text x="325" y="560" text-anchor="middle" font-size="11" fill="white">Static buffers</text><text x="325" y="574" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">linear memory</text><rect x="400" y="545" width="120" height="36" rx="6" fill="rgba(255,255,255,0.1)"/><text x="460" y="560" text-anchor="middle" font-size="11" fill="white">No dynamic</text><text x="460" y="574" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">allocation</text><rect x="535" y="545" width="135" height="36" rx="6" fill="rgba(255,255,255,0.1)"/><text x="602" y="560" text-anchor="middle" font-size="11" fill="white">Deterministic</text><text x="602" y="574" text-anchor="middle" font-size="10" fill="rgba(255,255,255,0.7)">outside the JIT</text><text x="400" y="612" text-anchor="middle" font-size="13" fill="rgba(255,255,255,0.6)">All algorithm logic lives in AssemblyScript — predictable execution, practical constant-time</text></svg>