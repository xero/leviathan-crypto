## API Reference

### Symmetric Ciphers
- Serpent-256 [TypeScript](serpent) | [WASM](asm_serpent)
	- `SerpentSeal`, `SerpentStream`, `SerpentStreamPool`, `SerpentStreamSealer`, `SerpentStreamOpener`, `Serpent`, `SerpentCtr`, `SerpentCbc`
- ChaCha20 [TypeScript](chacha20) | [WASM](asm_chacha) | [Pool](chacha20_pool)
	- `ChaCha20`, `Poly1305`, `ChaCha20Poly1305`, `XChaCha20Poly1305`, `XChaCha20Poly1305Pool`

### Hashing
- SHA-2 [TypeScript](sha2) | [WASM](asm_sha2)
	- `SHA256`, `SHA512`, `SHA384`, `HMAC_SHA256`, `HMAC_SHA512`, `HMAC_SHA384`, `HKDF_SHA256`, `HKDF_SHA512`
- SHA-3 [TypeScript](sha3) | [WASM](asm_sha3)
	- `SHA3_224`, `SHA3_256`, `SHA3_384`, `SHA3_512`, `SHAKE128`, `SHAKE256`

### Utilities
- [Fortuna CSPRNG](fortuna)
