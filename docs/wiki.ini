	- [SerpentCipher](ciphersuite#serpentcipher), [XChaCha20Cipher](ciphersuite#xchacha20cipher), [AESGCMSIVCipher](ciphersuite#aesgcmsivcipher), [KyberSuite](ciphersuite#kybersuite)

## Ciphers
- Serpent-256 [TypeScript](serpent) | [WASM](asm_serpent)
	- `Serpent`, `SerpentCtr`, `SerpentCbc`
- ChaCha20 [TypeScript](chacha20) | [WASM](asm_chacha)
	- `ChaCha20`, `Poly1305`, `ChaCha20Poly1305`, `XChaCha20Poly1305`
- AES [TypeScript](aes) | [WASM](asm_aes)
	- `AES`, `AESCbc`, `AESCtr`, `AESGCM`, `AESGCMSIV`, `AESGenerator`

## Signatures
- [Sign envelope & SignatureSuite catalog](signaturesuite)
	- `Sign`, `SignStream`, `VerifyStream`, format-byte catalog
- [Transparency log](merkle)
	- `MerkleLog`, `MerkleVerifier`, `SignedLog`, `Sha256Tree`, `Blake3Tree`
- Ed25519 [TypeScript](ed25519) | [WASM](asm_curve25519)
	- `Ed25519` (pure + Ed25519ph), `Ed25519Suite`, `Ed25519PreHashSuite`
- ECDSA-P256 [TypeScript](ecdsa-p256) | [WASM](asm_p256)
	- `EcdsaP256` (hedged + RFC 6979), `EcdsaP256Suite`, DER codec helpers
- ML-DSA [TypeScript](mldsa) | [WASM](asm_mldsa)
	- `MlDsa44/65/87` (FIPS 204), pure + prehash suites
- SLH-DSA [TypeScript](slhdsa) | [WASM](asm_slhdsa)
	- `SlhDsa128f/192f/256f` (FIPS 205), pure + prehash suites
- [Hybrid composites](signaturesuite#pq-only-hybrid-composite-encoding)
	- Classical+PQ: `MlDsa{44,65}Ed25519Suite`, `MlDsa{44,65}EcdsaP256Suite`
	- PQ-only: `MlDsa44SlhDsa128fSuite`, `MlDsa65SlhDsa192fSuite`, `MlDsa87SlhDsa256fSuite`

## Key Agreement
- X25519 [TypeScript](x25519) | [WASM](asm_curve25519)
	- `X25519`, `KeyAgreementError` (RFC 7748)

## Post-Quantum
- ML-KEM [TypeScript](kyber) | [WASM](asm_kyber)
	- `MlKem512`, `MlKem768`, `MlKem1024`
- [Ratchet (SPQR)](ratchet)
	- `KDFChain`, `ratchetInit`, `kemRatchetEncap/Decap`, `RatchetKeypair`, `SkippedKeyStore`

## Hashing
- SHA-2 [TypeScript](sha2) | [WASM](asm_sha2)
	- `SHA256`, `SHA512`, `SHA384`, `HMAC_SHA256`, `HMAC_SHA512`, `HMAC_SHA384`, `HKDF_SHA256`, `HKDF_SHA512`
- SHA-3 [TypeScript](sha3) | [WASM](asm_sha3)
	- `SHA3_224`, `SHA3_256`, `SHA3_384`, `SHA3_512`, `SHAKE128`, `SHAKE256`
- BLAKE3 [TypeScript](blake3) | [WASM](asm_blake3)
	- `BLAKE3`, `BLAKE3KeyedHash`, `BLAKE3DeriveKey` (+ streaming variants), `BLAKE3OutputReader`, `BLAKE3Hash`
- [KMAC](kmac)
	- `CSHAKE128`, `CSHAKE256`, `KMAC128`, `KMAC256`, `KMACXOF128`, `KMACXOF256`

